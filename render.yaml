# Render Blueprint: Startup Copilot backend (FastAPI + Nova/Bedrock)
# Deploy: push to Git, then in Render Dashboard use "New > Blueprint" and connect this repo.
# Set secrets (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, CORS_ORIGINS) in the Dashboard after first deploy.

services:
  - type: web
    runtime: docker
    name: startup-copilot-backend
    rootDir: backend
    # Dockerfile is at backend/Dockerfile; app listens on PORT (Render sets 10000)
    plan: free
    envVars:
      - key: AWS_REGION
        value: us-east-1
      - key: DEMO_GLOBAL
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
